# ──────────────────────────────────────────────
# 🌸 my-term kitty.conf  —  Catppuccin Cozy Anime Rice
# ──────────────────────────────────────────────

# ── Theme ─────────────────────────────────────
include catppuccin-mocha.conf

# ── Font ──────────────────────────────────────
font_family      Iosevka Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0
font_features    Iosevka Nerd Font +liga +calt +ss02 +ss05 +cv19
adjust_line_height  2
adjust_column_width 0
allow_bold       no

# ── Window ─────────────────────────────────────
window_padding_width       12
window_padding_width  8 16 4 16
window_margin_width        4
window_border_width        2.5
draw_minimal_borders       yes
hide_window_decorations    no

# Cozy transparency
background_opacity         0.88
background_blur            16
dynamic_background_opacity yes

# ── Cursor ─────────────────────────────────────
cursor_shape              beam
cursor_beam_thickness     2.0
cursor_trail              3
cursor_trail_start_threshold 3
cursor_stop_blinking_after 5.0

# ── Scrollback ────────────────────────────────
scrollback_lines          10000
scrollback_pager_history  1024
scrollback_fill_enlarged_window yes

# ── Tab bar ────────────────────────────────────
tab_bar_style             powerline
tab_powerline_style       round
tab_bar_margin_width      4.0
tab_bar_edge              bottom
tab_bar_background        #1e1e2e
tab_activity_symbol       ●
tab_title_template        "{title}"

# ── Bell ───────────────────────────────────────
visual_bell_duration      0.3
enable_audio_bell         no
bell_on_tab               yes

# ── Mouse ──────────────────────────────────────
mouse_hide_wait           2.0
url_style                 curly
open_url_with             default
copy_on_select            clipboard
click_interval            0.5
focus_follows_mouse       no
pointer_shape_when_grabbed arrow

# ── Performance ────────────────────────────────
repaint_delay             8
input_delay               2
sync_to_monitor           yes
linux_display_server      wayland

# ── Keyboard ───────────────────────────────────
# Vim-style navigation
map ctrl+shift+up         scroll_page_up
map ctrl+shift+down       scroll_page_down
map ctrl+shift+k          scroll_line_up
map ctrl+shift+j          scroll_line_down
map ctrl+shift+h          show_scrollback

# Tab management
map ctrl+shift+t          new_tab
map ctrl+shift+q          close_tab
map ctrl+shift+right      next_tab
map ctrl+shift+left       previous_tab
map ctrl+shift+1          goto_tab 1
map ctrl+shift+2          goto_tab 2
map ctrl+shift+3          goto_tab 3
map ctrl+shift+4          goto_tab 4
map ctrl+shift+5          goto_tab 5
map ctrl+shift+,          move_tab_forward
map ctrl+shift+.          move_tab_backward

# Window management
map ctrl+shift+enter      new_window
map ctrl+shift+w          close_window
map ctrl+shift+up         neighboring_window up
map ctrl+shift+down       neighboring_window down
map ctrl+shift+left       neighboring_window left
map ctrl+shift+right      neighboring_window right
map ctrl+shift+f          toggle_fullscreen
map ctrl+shift+space      toggle_layout

# Font size
map ctrl+plus             change_font_size all +1.0
map ctrl+minus            change_font_size all -1.0
map ctrl+0                change_font_size all 0

# Copy / Paste
map ctrl+shift+c          copy_to_clipboard
map ctrl+shift+v          paste_from_clipboard

# Layouts
map ctrl+shift+l          next_layout

# ── Shell ──────────────────────────────────────
shell zsh

# ── Startup ────────────────────────────────────
single_window            no
startup_session          none

# ── Misc ───────────────────────────────────────
confirm_os_window_close  0
allow_remote_control     yes
shell_integration        enabled
kitty_mod                ctrl+shift
strip_trailing_spaces    smart
